# 分镜审查器配置文件

# L1 校验规则
l1_rules:
  max_original_text_chars: 30  # 原文列字数上限
  min_coverage_rate: 0.85      # 最低覆盖率要求（85%）

# 流水线参数
pipeline:
  max_files_per_session: 10    # 每会话最大处理文件数

